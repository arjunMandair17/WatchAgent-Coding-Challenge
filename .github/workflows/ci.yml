name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weather
          POSTGRES_USER: weather_app
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U weather_app -d weather"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DB: weather
      POSTGRES_USER: weather_app
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST: localhost
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Configure environment
        run: cp .env.example .env

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nokia-weatherapi:ci .
